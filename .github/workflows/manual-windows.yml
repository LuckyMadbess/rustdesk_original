name: Manual Windows Build

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Build RustDesk
        run: |
          python3 build.py --flutter --portable --hwcodec --vram
