name: Portable Windows Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "120deac3062162151622ca4860575a33844ba10b"
      
      - name: Install vcpkg deps
        run: |
          $VCPKG_ROOT/vcpkg install opus:x64-windows-static
          $VCPKG_ROOT/vcpkg install --triplet x64-windows-static
        shell: bash
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
      
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: '1.75'
          targets: x86_64-pc-windows-msvc
      
      - name: Build
        env:
          VCPKG_ROOT: C:\vcpkg
        run: python build.py --flutter --portable
      
      - name: Pack portable
        shell: bash
        run: |
          cd libs/portable
          pip install -r requirements.txt
          python generate.py -f "../../flutter/build/windows/x64/runner/Release" -o . -e "../../flutter/build/windows/x64/runner/Release/rustdesk.exe"
          cd ../..
          mkdir -p output
          cp ./target/release/rustdesk-portable-packer.exe ./output/rustdesk-portable.exe 2>/dev/null || echo "Portable not created"
          cp ./flutter/build/windows/x64/runner/Release/rustdesk.exe ./output/ 2>/dev/null || echo "Regular exe copied"
      
      - uses: actions/upload-artifact@v4
        with:
          name: rustdesk-output
          path: ./output/
