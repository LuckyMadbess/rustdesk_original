name: Portable Windows Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: '1.75'
          targets: x86_64-pc-windows-msvc
      - name: Build portable EXE
        run: |
          python build.py --flutter --portable
          # Дополнительная упаковка в один EXE
          cd libs/portable
          pip install -r requirements.txt
          python generate.py -f ../../flutter/build/windows/x64/runner/Release/ -o . -e ../../flutter/build/windows/x64/runner/Release/rustdesk.exe
          cd ../..
          mkdir -p output
          mv ./target/release/rustdesk-portable-packer.exe ./output/rustdesk-portable.exe
      - uses: actions/upload-artifact@v4
        with:
          name: rustdesk-portable
          path: ./output/rustdesk-portable.exe
