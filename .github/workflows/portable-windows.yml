name: Portable Windows Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "120deac3062162151622ca4860575a33844ba10b"
      
      - name: Install vcpkg dependencies (including opus)
        run: |
          $VCPKG_ROOT/vcpkg install opus:x64-windows-static
          $VCPKG_ROOT/vcpkg install --triplet x64-windows-static
        shell: bash
      
      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: '1.75'
          targets: x86_64-pc-windows-msvc
      
      - name: Build RustDesk
        env:
          VCPKG_ROOT: C:\vcpkg
        run: python build.py --flutter --portable
      
      - name: Generate portable EXE
        run: |
          cd libs/portable
          pip install -r requirements.txt
          python generate.py -f "../../flutter/build/windows/x64/runner/Release" -o . -e "../../flutter/build/windows/x64/runner/Release/rustdesk.exe"
          cd ../..
          mkdir output
          cp ./target/release/rustdesk-portable-packer.exe ./output/rustdesk.exe
      
      - uses: actions/upload-artifact@v4
        with:
          name: rustdesk-portable
          path: ./output/rustdesk.exe
